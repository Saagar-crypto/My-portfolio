<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extraordinary React & SQL Portfolio</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151c2c;
            --accent-glow: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --terminal-bg: #05070c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
        }

        /* Hero Section Styling */
        header {
            padding: 80px 0 40px 0;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* Interactive SQL Terminal Box */
        .terminal-zone {
            background-color: var(--terminal-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin: 40px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #64748b;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            margin-bottom: 15px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        .terminal-title {
            color: var(--accent-glow);
            font-weight: bold;
        }

        .sql-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .terminal-prompt {
            color: #f43f5e;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
        }

        .sql-textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #38bdf8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.05rem;
            outline: none;
            resize: none;
        }

        .btn-run {
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn-run:hover {
            transform: scale(1.03);
        }

        /* Dynamic Grid Layout controlled by React */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .portfolio-card {
            background-color: var(--bg-card);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .portfolio-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-glow);
            box-shadow: 0 5px 20px rgba(56, 189, 248, 0.15);
        }

        .tag {
            display: inline-block;
            background-color: #0c4a6e;
            color: #38bdf8;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 50px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .card-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .error-msg {
            color: #ef4444;
            font-family: 'JetBrains Mono', monospace;
            margin-top: 10px;
        }

        .quick-hints {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .hint-pill {
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            color: #cbd5e1;
            margin-right: 5px;
            display: inline-block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 1. Mock SQL Database setup inside JavaScript Memory
        const DATABASE_TABLES = {
            projects: [
                { id: 1, category: 'ELECTRONICS', title: 'Smart Automated Lid System', description: 'Programmed an Arduino Uno with an ultrasonic distance detection module and high-torque micro-servo components to manipulate mechanical structures automated on situational positioning variables.' },
                { id: 2, category: 'LEADERSHIP', title: 'Student Assembly Management Console', description: 'Coordinated operational flow-structures for educational programming platforms. Structured presentation arrays, scheduled timing loops, and managed live student presentations smoothly.' },
                { id: 3, category: 'SOFTWARE', title: 'Dynamic Micro-System Interface', description: 'Constructed an adaptive cross-platform custom interface environment optimizing computing footprints for processing execution on restrictive core architectures.' }
            ]
        };

        function App() {
            // React State management tracking user SQL inputs and current query outputs
            const [sqlQuery, setSqlQuery] = useState("SELECT * FROM projects;");
            const [displayData, setDisplayData] = useState([]);
            const [error, setError] = useState("");

            // Execute the initial query automatically when the page boots up
            useEffect(() => {
                executeSQL(sqlQuery);
            }, []);

            // Simplified parsing engine that interprets native database statements
            const executeSQL = (queryText) => {
                setError("");
                const cleanQuery = queryText.replace(/;\s*$/, "").trim().toUpperCase();

                if (cleanQuery === "SELECT * FROM PROJECTS") {
                    setDisplayData(DATABASE_TABLES.projects);
                } else if (cleanQuery.includes("WHERE CATEGORY =")) {
                    // Custom evaluation logic parsing individual category lookups
                    try {
                        const match = queryText.match(/category\s*=\s*['"]([^'"]+)['"]/i);
                        if (match && match[1]) {
                            const targetCat = match[1].toUpperCase();
                            const filtered = DATABASE_TABLES.projects.filter(p => p.category === targetCat);
                            setDisplayData(filtered);
                        } else {
                            throw new Error("Syntax error near WHERE clause properties.");
                        }
                    } catch (e) {
                        setError("SQL Execution Fault: Invalid conditional syntax attributes.");
                    }
                } else {
                    setError("SQL Error: Table execution target not recognized. Try typing exactly: SELECT * FROM projects;");
                }
            };

            return (
                <div className="container">
                    <header>
                        <h1>Saagar | Tech-portfolio</h1>
                        <p className="subtitle">Driven by React Interfaces & Structural Database Schemas</p>
                    </header>

                    {/* Interactive SQL Compiler Section */}
                    <div className="terminal-zone">
                        <div className="terminal-header">
                            <div>💾 DATABASE TERMINAL: saagar_db_console</div>
                            <div className="terminal-title">STATUS: LIVE CONNECTED</div>
                        </div>
                        <div className="sql-input-row">
                            <span className="terminal-prompt">SQL&gt;</span>
                            <textarea 
                                className="sql-textarea"
                                rows="2"
                                value={sqlQuery}
                                onChange={(e) => setSqlQuery(e.target.value)}
                            />
                            <button className="btn-run" onClick={() => executeSQL(sqlQuery)}>RUN QUERY</button>
                        </div>
                        
                        {error && <div className="error-msg">{error}</div>}
                        
                        <div className="quick-hints">
                            <span>💡 Quick Filters (Click to copy query):</span><br />
                            <span className="hint-pill" onClick={() => setSqlQuery("SELECT * FROM projects;")}>SELECT * FROM projects;</span>
                            <span className="hint-pill" onClick={() => setSqlQuery("SELECT * FROM projects WHERE category = 'Electronics';")}>WHERE category = 'Electronics';</span>
                            <span className="hint-pill" onClick={() => setSqlQuery("SELECT * FROM projects WHERE category = 'Leadership';")}>WHERE category = 'Leadership';</span>
                        </div>
                    </div>

                    {/* React dynamically builds these layout boxes inside the UI layout matrix */}
                    <main>
                        <h2 style={{ fontSize: '1.5rem', marginBottom: '10px' }}>
                            Query Output Data Stream ({displayData.length} records found)
                        </h2>
                        
                        <div className="cards-grid">
                            {displayData.map((project) => (
                                <div className="portfolio-card" key={project.id}>
                                    <span className="tag">{project.category}</span>
                                    <div className="card-title">{project.title}</div>
                                    <div className="card-desc">{project.description}</div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        // Mount the React Application into the DOM execution thread
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
